services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dcc
    ports:
      - "5432:5432"
    volumes:
      - dcc-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dcc?schema=public
    # Optional: enable "seed with official lore" onboarding by mounting your
    # OWN dataset read-only. The DCC dataset is copyrighted and NOT shipped —
    # see docs/14-lore-seeding.md for the file format. Uncomment and point the
    # left side at your file (or set LORE_SEED_FILE for a custom container path).
    # volumes:
    #   - ./dungeon-crawler-carl.jsonl:/app/dungeon-crawler-carl.jsonl:ro

  worker:
    build: .
    command: npm run worker
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/dcc?schema=public
    # Optional: enable "seed with official lore" onboarding by mounting your
    # OWN dataset read-only. The DCC dataset is copyrighted and NOT shipped —
    # see docs/14-lore-seeding.md for the file format. Uncomment and point the
    # left side at your file (or set LORE_SEED_FILE for a custom container path).
    # volumes:
    #   - ./dungeon-crawler-carl.jsonl:/app/dungeon-crawler-carl.jsonl:ro

volumes:
  dcc-postgres:

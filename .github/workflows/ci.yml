name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs for the same branch/PR to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dcc?schema=public
  AUTH_SECRET: ci-test-secret-not-used-in-production
  AUTH_URL: http://localhost:3000
  # Encrypts BYO AI keys at rest (M4 — src/server/crypto.ts). Tests need it set;
  # this CI value is throwaway and never used in production.
  AI_KEYS_SECRET: ci-test-ai-keys-secret-not-used-in-production

jobs:
  # Fast feedback: lint + typecheck run in parallel with build-and-test, with
  # no database, so style/type errors surface without waiting on the heavy job.
  lint:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      # postinstall runs `prisma generate` (the generated client is needed for
      # typecheck); generation reads the schema only and needs no live database.
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build-and-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector image (Postgres 18 + the `vector` extension) — the M5
        # semantic-search migration runs `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dcc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      # postinstall runs `prisma generate`
      - run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      # Fail if schema.prisma has changes not captured in a committed migration.
      # Compares the just-migrated database against the current datamodel;
      # --exit-code returns 2 when they differ (i.e. a missing migration).
      - name: Check migration drift
        run: >-
          npx prisma migrate diff
          --from-config-datasource
          --to-schema=./prisma/schema.prisma
          --exit-code

      - name: Next.js build cache
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build
        run: npm run build

      # Runs the unit suite with coverage; the thresholds in vitest.config.ts
      # make this fail (and block the merge) if coverage drops below the floor.
      # The report-only Coverage workflow renders the per-PR trend separately.
      - name: Unit tests & coverage floors
        run: npm run test:coverage

  # E2E runs in its own job, in parallel with build-and-test. The official
  # Playwright image ships Chromium + all OS deps preinstalled, which removes the
  # ~9-minute `playwright install-deps` apt step (and the browser download) that
  # otherwise re-runs on every build. The suite drives `npm run dev`, so it needs
  # no production build — only deps + a migrated database.
  e2e:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: E2E tests
    runs-on: ubuntu-latest

    # Pin to the @playwright/test version in package-lock.json; the browser build
    # bundled in the image must match the test runner. Bump both together.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble

    services:
      postgres:
        # pgvector image (Postgres 18 + the `vector` extension) — the M5
        # semantic-search migration runs `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dcc
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # This job runs inside a container, so the Postgres service is reachable by
      # its label hostname on the shared network — not localhost. (The other env
      # vars are inherited from the workflow level.)
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dcc?schema=public

    steps:
      - uses: actions/checkout@v7

      # Restore the project's pinned Node over the container's bundled runtime;
      # the Playwright browsers live in /ms-playwright and are left untouched.
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      # postinstall runs `prisma generate`
      - run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: E2E tests
        run: npm run test:e2e

      # On failure, keep the HTML report + traces/screenshots for debugging.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  docker-smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        # pgvector image (Postgres 18 + the `vector` extension) — the M5
        # semantic-search migration runs `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dcc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: dcc-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d \
            --network host \
            --name dcc-smoke \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/dcc?schema=public \
            -e AUTH_SECRET=ci-smoke-secret \
            -e AUTH_URL=http://localhost:3000 \
            dcc-app

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:3000; then
              echo "Server ready after $((i * 2))s"
              exit 0
            fi
            if [ "$(docker inspect dcc-smoke --format='{{.State.Status}}')" != "running" ]; then
              echo "Container exited prematurely"
              docker logs dcc-smoke
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for server"
          docker logs dcc-smoke
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker logs dcc-smoke 2>&1 || true

      - name: Stop container
        if: always()
        run: docker rm -f dcc-smoke 2>/dev/null || true

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high

  audit:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      # Audit against the lockfile; fail only on high/critical in runtime deps.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

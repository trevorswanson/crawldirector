name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dcc?schema=public
  AUTH_SECRET: ci-test-secret-not-used-in-production
  AUTH_URL: http://localhost:3000

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dcc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall runs `prisma generate`
      - run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

  docker-smoke:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dcc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dcc-app .

      - name: Start container
        run: |
          docker run -d \
            --network host \
            --name dcc-smoke \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/dcc?schema=public \
            -e AUTH_SECRET=ci-smoke-secret \
            -e AUTH_URL=http://localhost:3000 \
            dcc-app

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:3000; then
              echo "Server ready after $((i * 2))s"
              exit 0
            fi
            if [ "$(docker inspect dcc-smoke --format='{{.State.Status}}')" != "running" ]; then
              echo "Container exited prematurely"
              docker logs dcc-smoke
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for server"
          docker logs dcc-smoke
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker logs dcc-smoke 2>&1 || true

      - name: Stop container
        if: always()
        run: docker rm -f dcc-smoke 2>/dev/null || true

name: Coverage

on:
  pull_request:

# Cancel an in-flight coverage run when the PR is updated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dcc?schema=public
  AUTH_SECRET: ci-test-secret-not-used-in-production
  AUTH_URL: http://localhost:3000

jobs:
  # Generate coverage for both the PR head and the base branch so the report
  # below can show the change in coverage. This is report-only and never blocks
  # the PR (the unit-test gate lives in ci.yml), so the job tolerates failures —
  # e.g. the base branch may predate this coverage setup.
  collect:
    if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    name: Collect coverage (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pr
            ref: ${{ github.event.pull_request.head.sha }}
          - name: base
            ref: ${{ github.event.pull_request.base.sha }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dcc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # postinstall runs `prisma generate`
      - run: npm ci

      # Coverage is best-effort: the base branch may predate this setup, so a
      # failure here must not fail the job. Whatever summary is produced gets
      # uploaded; a missing one just means no trend (handled by the report job).
      - name: Apply migrations
        continue-on-error: true
        run: npx prisma migrate deploy

      - name: Unit tests with coverage
        continue-on-error: true
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.name }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  report:
    name: Report coverage on PR
    runs-on: ubuntu-latest
    needs: collect
    if: ${{ !cancelled() && github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      # Needed so the action can read thresholds from vitest.config.ts.
      - uses: actions/checkout@v6

      - name: Download PR coverage
        uses: actions/download-artifact@v8
        with:
          name: coverage-pr
          path: coverage

      - name: Download base coverage
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: coverage-base
          path: coverage-base

      # The action errors if a compare path is set but missing, so only pass it
      # when the base summary actually exists (it won't until this lands on main).
      - name: Detect base coverage
        id: base
        run: |
          if [ -f coverage-base/coverage-summary.json ]; then
            echo "compare=coverage-base/coverage-summary.json" >> "$GITHUB_OUTPUT"
          else
            echo "compare=" >> "$GITHUB_OUTPUT"
            echo "No base coverage summary found; the trend will appear on later PRs."
          fi

      - name: Report coverage
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          vite-config-path: ./vitest.config.ts
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          json-summary-compare-path: ${{ steps.base.outputs.compare }}
          threshold-icons: "{0: '🔴', 80: '🟠', 90: '🟢'}"
          comment-on: pr
